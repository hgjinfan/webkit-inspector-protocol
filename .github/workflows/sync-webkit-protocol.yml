name: Sync WebKit Inspector Protocol

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone WebKit repository
        run: |
          git clone --depth 1 https://github.com/WebKit/WebKit.git webkit-repo

      - name: Verify protocol directory exists
        run: |
          if [ -d "webkit-repo/Source/JavaScriptCore/inspector/protocol" ]; then
            echo "✓ Protocol directory found"
            ls -la webkit-repo/Source/JavaScriptCore/inspector/protocol/ | head -20
          else
            echo "✗ Protocol directory not found"
            exit 1
          fi

      - name: Sync files to ./protocol
        run: |
          mkdir -p protocol
          cp -r webkit-repo/Source/JavaScriptCore/inspector/protocol/* protocol/
          echo "✓ Files synced successfully"
          ls -la protocol/ | head -20

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add protocol
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sync WebKit inspector protocol files: $(date -u +'%Y-%m-%d')"
          git push origin HEAD
