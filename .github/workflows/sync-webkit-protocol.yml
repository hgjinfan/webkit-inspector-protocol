name: Sync WebKit Inspector Protocol

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone WebKit and sparse-checkout protocol directory
        run: |
          # Clone shallow with sparse-checkout for the target path
          git clone --depth 1 --filter=blob:none --sparse https://github.com/WebKit/WebKit.git webkit
          cd webkit
          git sparse-checkout init --cone
          git sparse-checkout set files/Source/JavaScriptCore/inspector/protocol
          cd ..

      - name: Sync files to ./protocol
        run: |
          # Mirror the protocol dir into repo/protocol (delete removed files)
          rsync -a --delete webkit/files/Source/JavaScriptCore/inspector/protocol/ ./protocol/

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add protocol
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sync WebKit inspector protocol files: $(date -u +'%Y-%m-%d')"
          git push origin HEAD
