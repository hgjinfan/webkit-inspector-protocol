name: Sync WebKit Inspector Protocol

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC
  workflow_dispatch:
    inputs:
      sync_protocol:
        description: '同步 protocol 目录 (JavaScriptCore inspector protocol)'
        required: false
        type: boolean
        default: true
      sync_versions:
        description: '同步 versions 目录 (WebInspectorUI Versions)'
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_PROTOCOL: ${{ github.event_name == 'schedule' || inputs.sync_protocol == true }}
      SYNC_VERSIONS: ${{ github.event_name == 'schedule' || inputs.sync_versions == true }}
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine sparse-checkout paths
        id: paths
        run: |
          SPARSE_PATHS=""
          if [ "$SYNC_PROTOCOL" = "true" ]; then
            SPARSE_PATHS="Source/JavaScriptCore/inspector/protocol"
          fi
          if [ "$SYNC_VERSIONS" = "true" ]; then
            SPARSE_PATHS="$SPARSE_PATHS Source/WebInspectorUI/Versions"
          fi
          echo "sparse_paths=$SPARSE_PATHS" >> "$GITHUB_OUTPUT"
          echo "Sparse checkout paths: $SPARSE_PATHS"

      - name: Clone WebKit repository (sparse checkout)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/WebKit/WebKit.git webkit-repo
          cd webkit-repo
          git sparse-checkout set ${{ steps.paths.outputs.sparse_paths }}

      - name: Verify and sync protocol files
        if: env.SYNC_PROTOCOL == 'true'
        run: |
          if [ ! -d "webkit-repo/Source/JavaScriptCore/inspector/protocol" ]; then
            echo "✗ JavaScriptCore protocol directory not found"
            exit 1
          fi
          echo "✓ JavaScriptCore protocol directory found"
          mkdir -p protocol
          cp -r webkit-repo/Source/JavaScriptCore/inspector/protocol/* protocol/
          echo "✓ Protocol files synced"
          ls -la protocol/ | head -20

      - name: Verify and sync versions files
        if: env.SYNC_VERSIONS == 'true'
        run: |
          if [ ! -d "webkit-repo/Source/WebInspectorUI/Versions" ]; then
            echo "✗ WebInspectorUI Versions directory not found"
            exit 1
          fi
          echo "✓ WebInspectorUI Versions directory found"
          mkdir -p versions
          cp -r webkit-repo/Source/WebInspectorUI/Versions/* versions/
          echo "✓ Versions files synced"
          ls -la versions/ | head -20

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add protocol versions
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sync WebKit inspector protocol and versions: $(date -u +'%Y-%m-%d')"
          git push origin HEAD
